<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Interaktiver Lebenslauf</title>
</head>
<body>

  <section class="hero is-primary is-small">
    <div class="hero-body">
      <div class="container">
        <h1 class="title">Interaktiver Lebenslauf</h1>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-two-thirds">
          
          <div class="box">
            <h2 class="title is-4">Kontaktformular</h2>
            <form action="https://formspree.io/f/mgopzonz" method="post">
              
              <div class="field">
                <label class="label">Wieso melden Sie sich?</label>
                <div class="control">
                  <label class="radio">
                    <input type="radio" name="Grund" value="Support" checked> Support
                  </label>
                  <label class="radio">
                    <input type="radio" name="Grund" value="Projekt"> Projekt
                  </label>
                  <label class="radio">
                    <input type="radio" name="Grund" value="Feedback"> Feedback
                  </label>
                </div>
              </div>

              <div class="columns">
                <div class="column">
                  <div class="field">
                    <label class="label" for="name">Name</label>
                    <div class="control">
                      <input class="input" type="text" id="name" name="name" placeholder="Dein Name" required />
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label" for="email">Email</label>
                    <div class="control">
                      <input class="input" type="email" id="email" name="email" placeholder="beispiel@mail.de" required />
                    </div>
                  </div>
                </div>
              </div>

              <div class="columns">
                <div class="column is-one-third">
                  <div class="field">
                    <label class="label">PLZ</label>
                    <div class="control">
                      <input class="input" type="text" id="plz" name="plz" placeholder="z.B. 9000" oninput="sucheOrt()">
                    </div>
                  </div>
                </div>
                <div class="column">
                  <div class="field">
                    <label class="label">Ort</label>
                    <div class="control">
                      <div class="select is-fullwidth">
                        <select id="ort" name="ort"></select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="field">
                <label class="label" for="nachricht">Deine Nachricht</label>
                <div class="control">
                  <textarea class="textarea" id="nachricht" name="nachricht" rows="5" required placeholder="Schreibe hier deine Nachricht..."></textarea>
                </div>
              </div>

              <div class="field mt-5">
                <div class="control">
                  <button type="submit" class="button is-primary is-fullwidth"><strong>Absenden</strong></button>
                </div>
              </div>

            </form>
          </div>

        </div>
      </div>
    </div>
  </section>

  <script type="module" src="plz_ort.js"></script>
</body>
</html>
