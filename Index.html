<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Interaktiver Lebenslauf</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <style>
    </style>
  </head>

  <body>
    <h1>Interaktiver Lebenslauf</h1>

 <hr style="margin: 40px 0;">

  <div class="container">
    <h2>Kontaktformular</h2>
    <form action="https://formspree.io/f/mgopzonz" method="post">
   <div>
        <label><strong>Wieso melden Sie sich?</strong></label><br>
        <input type="radio" name="Grund" value="Support" checked> Support
        <input type="radio" name="Grund" value="Projekt"> Projekt
        <input type="radio" name="Grund" value="Feedback"> Feedback
      </div>

      <br>

      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />
      </div>

      <br>

      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
      </div>

      <br>
      
      <div>
        <label>PLZ:</label>
        <input type="text" id="plz" name="plz" oninput="sucheOrt()">
      </div>

      <br>

      <div>
        <label>Ort:</label>
        <select id="ort" name="ort" oninput="suchePLZ()"></select>
      </div>

      <div>
        <label for="nachricht">Deine Nachricht:</label><br>
        <textarea id="nachricht" name="nachricht" rows="5" cols="33" required placeholder="Schreibe hier deine Nachricht..."></textarea>
      </div>

      <br>

      <input type="submit" value="Absenden" />
    </form>
  </div>

  <script src="plz_ort.js"></script>

  </body
