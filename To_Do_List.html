<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Interaktiver Lebenslauf</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
    }
    input {
      width: 70%;
      padding: 8px;
    }
    button {
      padding: 8px;
      cursor: pointer;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 8px;
      margin-top: 5px;
      background: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 5px;
      gap: 10px; /* Abstand zwischen Text und Button */
    }
    li.done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
  </head>

  <body>
    <!-- <h1>Interaktiver Lebenslauf</h1> -->

    <div class="container">
        <h1>To-Do Liste</h1>
        <input type="text" id="taskInput" placeholder="Neue Aufgabe...">
        <button onclick="addTask()">Hinzufügen</button>
        <ul id="taskList"></ul>
    </div>

     <script>
        function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();

        if (text === '') return;

        const li = document.createElement('li');
        li.textContent = text;

        li.onclick = () => li.classList.toggle('done');

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'X';
        deleteBtn.onclick = () =>  document.getElementById('taskList').removeChild(li);

        li.appendChild(deleteBtn);

        document.getElementById('taskList').appendChild(li);
        input.value = '';
        }
    </script>
  </body
