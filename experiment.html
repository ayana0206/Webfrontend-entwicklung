<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Meine erste Webseite</title>
     <style>
      .experiment {
      background-color: lightblue;
      width: 60em;
      height: 10em;
      flex-direction: row;
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      }

      .experiment-text {
        background-color: beige;
        align-self: between;
        border: 2px solid black;
        flex: 1;
        display: flex;
      }
      #hello {
        background-color: lightcoral;
      }
      #world {
        background-color: lightgreen;
      }
      #exclamation {
        background-color: lightyellow;
        width: fit-content;
        height: fit-content;
        flex: 0 0 auto;
      }
      #pips {
        background-color: lightgray;
      }

  </style>
  </head>

  <body>
    <h1>Hello World</h1>


<div class="experiment"> 
  <p id="hello" class="experiment-text">hello</p>
  <p id="world" class="experiment-text">world</p>
  <p id="exclamation" class="experiment-text">hallo zusammen wir sind am programmieren</p>
  <p id="pips" class="experiment-text"> pips </p>
</div>

    <hr>

    <h2>Kontaktformular</h2>
    <form action="https://formspree.io/f/mgopzonz" method="post">
     <div>
        <label><strong>Wieso melden Sie sich?</strong></label><br>
        <input type="radio" id="support" name="Grund" value="Support" checked />
        <label for="support">Support</label>
        <input type="radio" id="projekt" name="Grund" value="Projekt" />
        <label for="projekt">Projekt</label>
        <input type="radio" id="feedback" name="Grund" value="Feedback" />
        <label for="feedback">Feedback</label>
      </div>

      <br>

      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />
      </div>

      <br>

      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
      </div>

      <br>

      <div>
        <label for="nachricht">Deine Nachricht:</label><br>
        <textarea id="nachricht" name="nachricht" rows="5" cols="33" required placeholder="Schreibe hier deine Nachricht..."></textarea>
      </div>

      <br>

      <input type="submit" value="Absenden" />
    </form>

  </body>
</html>
